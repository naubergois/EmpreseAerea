# ============================================================
# SonarQube — Configuração de análise do projeto SkyAgent
# ============================================================
sonar.projectKey=skyagent
sonar.projectName=SkyAgent
sonar.projectVersion=1.0.0

# Servidor (sobrescreva com -Dsonar.host.url / token no CI)
sonar.host.url=http://localhost:9000

# Encoding
sonar.sourceEncoding=UTF-8

# --- Código-fonte analisado ---
sonar.sources=backend,frontend/src,scripts
sonar.tests=backend/tests

# --- Exclusões (não são código de produção) ---
sonar.exclusions=\
    **/venv/**,\
    **/node_modules/**,\
    **/dist/**,\
    **/__pycache__/**,\
    **/*.db,\
    **/.env,\
    **/.env.*,\
    backend/tests/**,\
    frontend/scripts/**

# Arquivos de ambiente não devem passar pelo sensor de segredos
sonar.text.exclusions=**/.env,**/.env.*

# --- Python ---
sonar.python.version=3.11,3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.xunit.reportPath=backend/pytest-report.xml

# --- JavaScript / Frontend ---
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Duplicação: ignora arquivos gerados
sonar.cpd.exclusions=**/dist/**,**/migrations/**

# SCM blame desabilitado (evita travamento em volume Docker no macOS)
sonar.scm.disabled=true
